<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 5th Exe Bunos Soundboard </title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background video -->
    <video autoplay muted loop id="bg-video">

        <source src="bgvideo.mp4" type="video/mp4">

    </video>

    <header>

        <h1> Audio Sampler </h1>
        
    </header>

    <!-- Main content area -->
    <main>

        <!-- All sound sample buttons -->
        <section class="soundboard">

            <button class="sample" data-sound="sound1">Ah-Ha</button>
            <button class="sample" data-sound="sound2">Back of the net</button>
            <button class="sample" data-sound="sound3">Bang out of order</button>
            <button class="sample" data-sound="sound4">Dan</button>
            <button class="sample" data-sound="sound5">Email of the evening</button>
            <button class="sample" data-sound="sound6">Hello partridge</button>
            <button class="sample" data-sound="sound7">I ate a scotch egg</button>
            <button class="sample" data-sound="sound8">I'm confused</button>
            <button class="sample" data-sound="sound9">Rawr</button>

        </section>

    </main>

    <!-- Local audio files linked to each button -->
    <audio id="sound1" src="audio/ahha.mp3"></audio>
    <audio id="sound2" src="audio/backofthenet.mp3"></audio>
    <audio id="sound3" src="audio/bangoutoforder.mp3"></audio>
    <audio id="sound4" src="audio/dan.mp3"></audio>
    <audio id="sound5" src="audio/emailoftheevening.mp3"></audio>
    <audio id="sound6" src="audio/hellopartridge.mp3"></audio>
    <audio id="sound7" src="audio/iateascotchegg.mp3"></audio>
    <audio id="sound8" src="audio/imconfused.mp3"></audio>
    <audio id="sound9" src="audio/rawr.wav"></audio>

    <!-- Link to external JavaScript -->
    <script src="index.js"></script>

</body>
</html>
