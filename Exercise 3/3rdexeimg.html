<!Doctype html>

<html>

    <head>

        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- CSS files for styling and image filters -->
        <link rel="stylesheet" href="3rdexeimgalt.css">

        <!-- Page title -->
        <title> 3rd Exercise Alt Images </title>

    </head>

    <body>

        <!-- Background Video -->
         <video autoplay muted loop id="bg-video">
            <source src="bg-video4.mp4" type="video/mp4">
         </video>

        <!-- Page header -->
        <header>
            <h1> Dark Ocean Voyage </h1>
        </header>

        <!-- Image 1 -->
        <figure id="A" class="card">

            <!-- Image with alt, title attributes-->
            <img 
                src="dark/gabriela-i8WMsaIkH8Q-unsplash.jpg" 
                alt="Close up of a nautical compass showing the direction at sea." 
                title="Nautical Compass - Dark Ocean Theme">

            <!-- Image copyright and license -->
            <figcaption class="license">
                Photo by Gabriela on
                <a href="https://unsplash.com/license" target="_blank">Unsplash</a>
                Free for commercial use under the Unsplash License.
            </figcaption>

        </figure>

        <!-- Image 2 -->
        <figure id="A" class="card">

            <img 
                src="dark/jakob-owens-8tyCOqTqdqg-unsplash.jpg" 
                alt="Powerful ocean waves crashing and swirling, representing the strength and movement of the sea." 
                title="Dark Ocean Waves - Power and Motion of the Sea">

            <figcaption class="license">
                Photo by Jakob Owens on
                <a href="https://unsplash.com/license" target="_blank">Unsplash</a>
                Free for commercial use under the Unsplash License.
            </figcaption>

        </figure>

        <!-- Image 3 -->
        <figure id="A" class="card"> 

            <img 
                src="dark/fjell-photography-BAF-n8e68TU-unsplash.jpg" 
                alt="Sunlight reflecting on the flat ocean between dark rocky cliffs"
                title="Sunlit Ocean Between Rocky Cliffs">

            <figcaption class="license">
                Photo by Fjell Photography on
                <a href="https://unsplash.com/license" target="_blank">Unsplash</a>
                Free for commercial use under the Unsplash License.
            </figcaption>

        </figure>
    
    </body>

</html>
