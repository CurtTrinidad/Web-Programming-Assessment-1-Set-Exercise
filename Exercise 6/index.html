<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6th Exe Petrol Calculator</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- Main Title -->
    <h1> Adnoc </h1>
    <!-- Main Calculator Container -->
    <div class="calcu-cont">

        <h1>Petrol Calculator</h1>
        <p class="subt">Calculate the total cost of petrol purchased</p>

        <!-- Input for petrol cost per liter -->
        <div class="inp">

            <label for="costPerLiter">Cost of Petrol per Liter</label>
            <input type="number" id="costPerLiter" value="2.48" step="0.01">

        </div>

        <!-- Input for liters purchased -->
        <div class="inp">

            <label for="litersPurchased">Liters Purchased</label>
            <input type="number" id="litersPurchased" value="0" step="0.01">

        </div>

        <!-- Button to calculate the total -->
        <button id="calcubtn">Calculate Total</button>

        <!-- Shows the total cost -->
        <p id="totalCost">Total Cost: DHS 0.00</p>

    </div>

    <script src="script.js"></script>

</body>

</html>
